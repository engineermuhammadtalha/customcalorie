<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CustomCalorie — Snap. Know. Own.</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0d0f0a;--surface:#151810;--card:#1a1e12;--border:#2a3020;
      --accent:#b4f060;--accent2:#7ecb20;--adim:rgba(180,240,96,0.12);
      --text:#eef2e6;--muted:#7a8a6a;--danger:#ff6b6b;--r:18px;
    }
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}
    body::after{content:'';position:fixed;top:-200px;left:50%;transform:translateX(-50%);width:600px;height:600px;background:radial-gradient(circle,rgba(180,240,96,0.07) 0%,transparent 70%);pointer-events:none;z-index:0}
    .wrap{position:relative;z-index:1;max-width:740px;margin:0 auto;padding:0 20px 80px}
    header{padding:44px 0 48px;text-align:center}
    .badge{display:inline-flex;align-items:center;gap:8px;background:var(--adim);border:1px solid rgba(180,240,96,0.25);border-radius:100px;padding:6px 16px;margin-bottom:24px;font-size:11px;font-weight:500;color:var(--accent);letter-spacing:.08em;text-transform:uppercase}
    .dot{width:6px;height:6px;background:var(--accent);border-radius:50%;animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
    h1{font-family:'Syne',sans-serif;font-size:clamp(40px,9vw,72px);font-weight:800;line-height:.92;letter-spacing:-.03em;margin-bottom:16px}
    h1 span{color:var(--accent);display:block}
    .tag{font-size:15px;color:var(--muted);font-weight:300}
    .tag strong{color:var(--text);font-weight:500}
    .upload-zone{border:2px dashed var(--border);border-radius:var(--r);padding:52px 28px;text-align:center;cursor:pointer;transition:all .3s;background:var(--surface);margin-bottom:16px}
    .upload-zone:hover,.upload-zone.over{border-color:var(--accent);background:var(--card)}
    .uicon{font-size:48px;margin-bottom:14px;display:block}
    .utitle{font-family:'Syne',sans-serif;font-size:19px;font-weight:700;margin-bottom:6px}
    .usub{font-size:13px;color:var(--muted);margin-bottom:20px}
    .ubtn{display:inline-flex;align-items:center;gap:8px;background:var(--accent);color:#0d0f0a;border:none;border-radius:100px;padding:12px 28px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s}
    .ubtn:hover{background:#c8f570;transform:translateY(-1px);box-shadow:0 8px 24px rgba(180,240,96,.3)}
    #fi{display:none}
    .prev-wrap{display:none;margin-bottom:16px;border-radius:var(--r);overflow:hidden;position:relative;border:1px solid var(--border)}
    .prev-wrap img{width:100%;max-height:280px;object-fit:cover;display:block}
    .prev-ov{position:absolute;bottom:0;left:0;right:0;padding:14px 18px;background:linear-gradient(to top,rgba(13,15,10,.95),transparent);display:flex;align-items:center;justify-content:space-between}
    .prev-name{font-size:12px;color:var(--muted)}
    .chg{font-size:12px;color:var(--accent);background:var(--adim);border:1px solid rgba(180,240,96,.2);border-radius:100px;padding:4px 12px;cursor:pointer}
    .chg:hover{background:rgba(180,240,96,.2)}
    .abtn{width:100%;padding:17px;background:var(--accent);color:#0d0f0a;border:none;border-radius:var(--r);font-family:'Syne',sans-serif;font-size:17px;font-weight:800;cursor:pointer;transition:all .3s;display:none;align-items:center;justify-content:center;gap:10px}
    .abtn:hover{background:#c8f570;transform:translateY(-2px);box-shadow:0 12px 32px rgba(180,240,96,.35)}
    .abtn.loading{background:var(--card);color:var(--accent);border:1px solid var(--border);cursor:not-allowed;transform:none;box-shadow:none}
    .spin{width:20px;height:20px;border:2px solid rgba(180,240,96,.3);border-top-color:var(--accent);border-radius:50%;animation:sp .8s linear infinite}
    @keyframes sp{to{transform:rotate(360deg)}}
    .err{display:none;background:rgba(255,107,107,.1);border:1px solid rgba(255,107,107,.3);border-radius:var(--r);padding:18px 22px;color:var(--danger);margin-top:16px;font-size:14px}
    .res{display:none;margin-top:28px;animation:fu .5s ease forwards}
    @keyframes fu{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    .fhdr{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:24px;margin-bottom:12px;display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap}
    .fname{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;margin-bottom:6px;line-height:1.1}
    .fdesc{font-size:13px;color:var(--muted);line-height:1.6;max-width:400px}
    .hbadge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:100px;font-size:12px;font-weight:600;white-space:nowrap;flex-shrink:0}
    .hbadge.yes{background:rgba(180,240,96,.15);color:var(--accent);border:1px solid rgba(180,240,96,.25)}
    .hbadge.no{background:rgba(255,107,107,.12);color:var(--danger);border:1px solid rgba(255,107,107,.25)}
    .calcard{background:var(--accent);border-radius:var(--r);padding:26px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
    .callbl{font-size:11px;font-weight:600;color:rgba(13,15,10,.55);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
    .calval{font-family:'Syne',sans-serif;font-size:52px;font-weight:800;color:#0d0f0a;line-height:1}
    .calunit{font-size:13px;color:rgba(13,15,10,.45);margin-top:4px}
    .calico{font-size:48px}
    .mgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px}
    .mcard{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 12px;text-align:center;transition:border-color .2s}
    .mcard:hover{border-color:var(--accent)}
    .mico{font-size:24px;margin-bottom:8px}
    .mval{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;margin-bottom:4px}
    .mlbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
    .scard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:22px;margin-bottom:12px}
    .shdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
    .stitle{font-family:'Syne',sans-serif;font-size:15px;font-weight:700}
    .snum{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:var(--accent)}
    .sbg{background:var(--border);border-radius:100px;height:10px;overflow:hidden}
    .sfill{height:100%;border-radius:100px;background:linear-gradient(90deg,var(--accent2),var(--accent));transition:width 1.2s cubic-bezier(.34,1.56,.64,1);width:0%}
    .tcard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:22px}
    .ttitle{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;margin-bottom:14px}
    .tip{display:flex;align-items:flex-start;gap:10px;padding:11px 0;border-bottom:1px solid var(--border);font-size:13px;color:var(--muted);line-height:1.6;animation:fu .5s ease forwards;opacity:0}
    .tip:last-child{border-bottom:none}
    .tip:nth-child(1){animation-delay:.1s}.tip:nth-child(2){animation-delay:.2s}.tip:nth-child(3){animation-delay:.3s}
    .tdot{width:20px;height:20px;background:var(--adim);border:1px solid rgba(180,240,96,.25);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;color:var(--accent);font-weight:700;margin-top:1px}
    footer{text-align:center;padding-top:48px;font-size:12px;color:var(--muted)}
    footer a{color:var(--accent);text-decoration:none}
    footer a:hover{text-decoration:underline}
  </style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="badge"><span class="dot"></span>AI-Powered Nutrition Analyzer</div>
    <h1>Custom<span>Calorie</span></h1>
    <p class="tag">Snap it. <strong>Know it.</strong> Own it.</p>
  </header>

  <div class="upload-zone" id="uz">
    <span class="uicon">🍽️</span>
    <p class="utitle">Drop your food photo here</p>
    <p class="usub">JPG, PNG, WEBP · Any food works</p>
    <button class="ubtn" onclick="document.getElementById('fi').click()">📸 Choose Photo</button>
    <input type="file" id="fi" accept="image/*"/>
  </div>

  <div class="prev-wrap" id="pw">
    <img id="pi" src="" alt="preview"/>
    <div class="prev-ov">
      <span class="prev-name" id="pn"></span>
      <button class="chg" onclick="document.getElementById('fi').click()">Change</button>
    </div>
  </div>

  <button class="abtn" id="ab" onclick="analyze()">🔍 Analyze Nutrition</button>
  <div class="err" id="eb"></div>

  <div class="res" id="res">
    <div class="fhdr">
      <div><div class="fname" id="fn"></div><div class="fdesc" id="fd"></div></div>
      <div class="hbadge" id="hb"></div>
    </div>
    <div class="calcard">
      <div>
        <div class="callbl">Estimated Calories</div>
        <div class="calval" id="cal">—</div>
        <div class="calunit">kcal per serving</div>
      </div>
      <div class="calico">🔥</div>
    </div>
    <div class="mgrid">
      <div class="mcard"><div class="mico">🥩</div><div class="mval" id="pro">—</div><div class="mlbl">Protein</div></div>
      <div class="mcard"><div class="mico">🌾</div><div class="mval" id="crb">—</div><div class="mlbl">Carbs</div></div>
      <div class="mcard"><div class="mico">🫒</div><div class="mval" id="fat">—</div><div class="mlbl">Fats</div></div>
    </div>
    <div class="scard">
      <div class="shdr"><span class="stitle">⚡ Health Score</span><span class="snum" id="sn">—</span></div>
      <div class="sbg"><div class="sfill" id="sf"></div></div>
    </div>
    <div class="tcard">
      <div class="ttitle">💡 Health Tips</div>
      <div id="tl"></div>
    </div>
  </div>

  <footer>Powered by <a href="https://aistudio.google.com" target="_blank">Google Gemini AI</a> &nbsp;·&nbsp; <a href="https://customcalorie.com" target="_blank">customcalorie.com</a></footer>
</div>

<script>
  const fi=document.getElementById('fi'),uz=document.getElementById('uz'),pw=document.getElementById('pw'),
        pi=document.getElementById('pi'),pn=document.getElementById('pn'),ab=document.getElementById('ab'),
        res=document.getElementById('res'),eb=document.getElementById('eb');
  let sf=null;
  uz.addEventListener('dragover',e=>{e.preventDefault();uz.classList.add('over')});
  uz.addEventListener('dragleave',()=>uz.classList.remove('over'));
  uz.addEventListener('drop',e=>{e.preventDefault();uz.classList.remove('over');const f=e.dataTransfer.files[0];if(f&&f.type.startsWith('image/'))load(f)});
  uz.addEventListener('click',e=>{if(e.target===uz)fi.click()});
  fi.addEventListener('change',()=>{if(fi.files[0])load(fi.files[0])});
  function load(f){
    sf=f;
    const r=new FileReader();
    r.onload=e=>{
      pi.src=e.target.result;pn.textContent=f.name;
      uz.style.display='none';pw.style.display='block';
      ab.style.display='flex';res.style.display='none';eb.style.display='none';
    };
    r.readAsDataURL(f);
  }
  async function analyze(){
    if(!sf)return;
    ab.classList.add('loading');ab.innerHTML='<div class="spin"></div> Analyzing...';
    eb.style.display='none';res.style.display='none';
    const fd=new FormData();fd.append('file',sf);
    try{
      const r=await fetch('/analyze',{method:'POST',body:fd});
      const d=await r.json();
      if(!r.ok||d.error)throw new Error(d.error||'Something went wrong');
      show(d);
    }catch(e){
      eb.textContent='❌ '+e.message;eb.style.display='block';
    }finally{
      ab.classList.remove('loading');ab.innerHTML='🔍 Analyze Again';
    }
  }
  function show(d){
    document.getElementById('fn').textContent=d.food_name||'Unknown Food';
    document.getElementById('fd').textContent=d.description||'';
    document.getElementById('cal').textContent=String(d.calories).replace(/[^\d]/g,'')||'—';
    document.getElementById('pro').textContent=d.protein||'—';
    document.getElementById('crb').textContent=d.carbs||'—';
    document.getElementById('fat').textContent=d.fats||'—';
    const s=parseInt(d.health_score)||5;
    document.getElementById('sn').textContent=s+'/10';
    setTimeout(()=>{document.getElementById('sf').style.width=(s*10)+'%'},150);
    const hb=document.getElementById('hb');
    if(d.is_healthy){hb.textContent='✅ Healthy Choice';hb.className='hbadge yes';}
    else{hb.textContent='⚠️ Indulge Wisely';hb.className='hbadge no';}
    const tl=document.getElementById('tl');tl.innerHTML='';
    (d.health_tips||[]).forEach((t,i)=>{
      tl.innerHTML+=`<div class="tip"><div class="tdot">${i+1}</div><span>${t}</span></div>`;
    });
    res.style.display='block';
    setTimeout(()=>res.scrollIntoView({behavior:'smooth',block:'start'}),100);
  }
</script>
</body>
</html>
